name: Update profile card

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches: [main]
    paths:
      - "assets/ascii-art.txt"
      - "profile.json"
      - "scripts/**"
      - ".github/workflows/update-profile.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild SVG files
        run: python scripts/build_profile.py

      - name: Refresh GitHub statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: HosniBelfeki
        run: python scripts/update_stats.py

      - name: Commit refreshed profile
        run: |
          if git diff --quiet; then
            echo "No profile changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git commit -m "chore: refresh profile card"
          git push
